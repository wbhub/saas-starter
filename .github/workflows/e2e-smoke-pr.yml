name: E2E Smoke (PR)

on:
  pull_request:
  workflow_dispatch:

jobs:
  billing-config-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - billing_mode: free_only
            BILLING_PROVIDER: none
            APP_FREE_PLAN_ENABLED: "true"
            STRIPE_SECRET_KEY: ""
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ""
            STRIPE_WEBHOOK_SECRET: ""
            STRIPE_STARTER_PRICE_ID: ""
            STRIPE_GROWTH_PRICE_ID: ""
            STRIPE_PRO_PRICE_ID: ""
          - billing_mode: stripe_enabled
            BILLING_PROVIDER: stripe
            APP_FREE_PLAN_ENABLED: "false"
            STRIPE_SECRET_KEY: sk_test_ci
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
            STRIPE_WEBHOOK_SECRET: whsec_ci
            STRIPE_STARTER_PRICE_ID: price_starter_ci
            STRIPE_GROWTH_PRICE_ID: price_growth_ci
            STRIPE_PRO_PRICE_ID: price_pro_ci
    env:
      CI: "true"
      BILLING_PROVIDER: ${{ matrix.BILLING_PROVIDER }}
      APP_FREE_PLAN_ENABLED: ${{ matrix.APP_FREE_PLAN_ENABLED }}
      STRIPE_SECRET_KEY: ${{ matrix.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ matrix.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ matrix.STRIPE_WEBHOOK_SECRET }}
      STRIPE_STARTER_PRICE_ID: ${{ matrix.STRIPE_STARTER_PRICE_ID }}
      STRIPE_GROWTH_PRICE_ID: ${{ matrix.STRIPE_GROWTH_PRICE_ID }}
      STRIPE_PRO_PRICE_ID: ${{ matrix.STRIPE_PRO_PRICE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run billing runtime matrix tests
        run: npm run test -- lib/env.test.ts lib/billing/capabilities.test.ts lib/billing/free-only-runtime.test.ts

  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      CI: "true"
      PLAYWRIGHT_BASE_URL: ${{ secrets.PLAYWRIGHT_BASE_URL }}
      E2E_OWNER_EMAIL: ${{ secrets.E2E_OWNER_EMAIL }}
      E2E_OWNER_PASSWORD: ${{ secrets.E2E_OWNER_PASSWORD }}
      E2E_MEMBER_EMAIL: ${{ secrets.E2E_MEMBER_EMAIL }}
      E2E_MEMBER_PASSWORD: ${{ secrets.E2E_MEMBER_PASSWORD }}
      E2E_INVITE_TOKEN: ${{ secrets.E2E_INVITE_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Playwright secret availability
        id: e2e_secrets
        run: |
          missing=""
          for key in PLAYWRIGHT_BASE_URL E2E_OWNER_EMAIL E2E_OWNER_PASSWORD E2E_MEMBER_EMAIL E2E_MEMBER_PASSWORD; do
            if [ -z "${!key}" ]; then
              missing="$missing $key"
            fi
          done
          if [ -n "$missing" ]; then
            echo "run_smoke=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Playwright smoke tests; missing secrets:$missing"
          else
            echo "run_smoke=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Vitest suite
        run: npm run test

      - name: Install Playwright browser
        if: steps.e2e_secrets.outputs.run_smoke == 'true'
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        if: steps.e2e_secrets.outputs.run_smoke == 'true'
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: playwright-report
          retention-days: 14
